services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dav_distro
      POSTGRES_USER: dav
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dav -d dav_distro"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://dav:${DB_PASSWORD:-changeme}@db:5432/dav_distro
      CONFIG_PATH: /app/config/portals.ini
      UPLOAD_DIR: /app/uploads
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      USER_BERND_PASSWORD: ${USER_BERND_PASSWORD:-Bx7@kP3mLw}
      USER_DORO_PASSWORD: ${USER_DORO_PASSWORD:-Qn5!sJ7vYe}
    volumes:
      - ./config:/app/config:ro
      - uploads:/app/uploads
      - ${SOURCE_DIR:-/data/source}:/data/source:ro
      - ${EXPORT_DIR:-/data/export}:/data/export
      - ${STORAGE_DIR:-/opt/dav-storage}:/storage
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - SERVICE_FQDN_FRONTEND_80

  # ── SFTP-Upload-Server ───────────────────────────────────────────────────────
  # Zugang: sftp <user>@<host> -p <SFTP_PORT>
  # Verzeichnisse im SFTP:
  #   /zips     → SOURCE_DIR  (Audiobook-ZIPs)
  #   /storage  → STORAGE_DIR (toc/, covers/, pdf/ …)
  sftp:
    image: atmoz/sftp:latest
    restart: unless-stopped
    ports:
      - "${SFTP_PORT:-2222}:22"
    volumes:
      - ${SOURCE_DIR:-/data/source}:/home/${SFTP_USER:-dav-upload}/zips
      - ${STORAGE_DIR:-/opt/dav-storage}:/home/${SFTP_USER:-dav-upload}/storage
    command: "${SFTP_USER:-dav-upload}:${SFTP_PASSWORD:-changeme-sftp}:1000"

volumes:
  postgres_data:
  uploads:
