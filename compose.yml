services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dav_distro
      POSTGRES_USER: dav
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dav -d dav_distro"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://dav:${DB_PASSWORD:-changeme}@db:5432/dav_distro
      CONFIG_PATH: /app/config/portals.ini
      UPLOAD_DIR: /app/uploads
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      USER_BERND_PASSWORD: ${USER_BERND_PASSWORD:-Bx7@kP3mLw}
      USER_DORO_PASSWORD: ${USER_DORO_PASSWORD:-Qn5!sJ7vYe}
    volumes:
      - ./config:/app/config:ro
      - uploads:/app/uploads
      - /opt/audiobook-storage/zips:/data/source:ro
      - /opt/audiobook-storage/export:/data/export
      - /opt/dav-storage:/storage
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - SERVICE_FQDN_FRONTEND_80

  # ── SFTP-Upload-Server ───────────────────────────────────────────────────────
  # Zugang per SSH-Key (kein Passwort):
  #   sftp -i ~/.ssh/id_rsa dav-upload@<host> -p 2222
  # Verzeichnisse im SFTP:
  #   /zips     → SOURCE_DIR  (Audiobook-ZIPs)
  #   /storage  → STORAGE_DIR (toc/, covers/, pdf/ …)
  # SSH Public Key eintragen in: config/sftp_authorized_keys
  sftp:
    image: atmoz/sftp:latest
    restart: unless-stopped
    ports:
      - "2222:22"
    volumes:
      - /opt/audiobook-storage/zips:/home/dav-upload/zips
      - /opt/dav-storage:/home/dav-upload/storage
      - ./config/sftp_authorized_keys:/home/dav-upload/.ssh/authorized_keys:ro
    command: "dav-upload::1000"

volumes:
  postgres_data:
  uploads:
